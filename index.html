<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paper Agent 2026 | 完整大纲修复版</title>
    
    <!-- 引入 Vue 3 和 Tailwind CSS -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 PDF.js 核心库与官方 CSS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf_viewer.min.css">
    
    <!-- 引入字体与图标 -->
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { paper: '#F9F8F6', navBg: '#F3F4F6', highlight: '#FDBA74' },
                    fontFamily: { lora:['Lora', 'serif'], sans:['"IBM Plex Sans"', 'sans-serif'] }
                }
            }
        }
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>

    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        .resizer { width: 4px; cursor: col-resize; background-color: #e5e7eb; transition: background-color 0.2s; z-index: 50; }
        .resizer:hover, .resizer.active { background-color: #fb923c; }
        
        .pdf-page-container { 
            position: relative; 
            margin: 0 auto 20px auto; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); 
            background-color: white; 
        }
        .textLayer { opacity: 1 !important; }
        .textLayer span { color: transparent !important; }
        .textLayer ::selection { background: rgba(253, 186, 116, 0.4); color: transparent; }
    </style>
</head>
<body class="font-sans text-gray-800 h-screen w-screen overflow-hidden bg-white">
    <div id="app" class="flex h-full w-full flex-col md:flex-row relative">
        
        <!-- ================= 左栏：导航与大纲 ================= -->
        <div class="bg-navBg flex flex-col hidden md:flex shrink-0 transition-all" :style="{ width: leftWidth + 'px' }">
            <div class="p-4 border-b">
                <h1 class="font-bold text-lg truncate" :title="paperTitle">{{ paperTitle || '未上传论文' }}</h1>
                <p class="text-xs text-gray-500 mt-1"><i class="fas fa-book-open"></i> 原文结构增强版</p>
                <div class="mt-4 flex gap-2">
                    <button @click="triggerUpload" class="bg-blue-600 text-white text-sm px-3 py-1.5 rounded shadow hover:bg-blue-700 transition w-full">
                        <i class="fas fa-upload"></i> 上传 PDF
                    </button>
                    <button @click="showApiModal = true" class="bg-gray-200 text-gray-700 text-sm px-3 py-1.5 rounded hover:bg-gray-300 transition">
                        <i class="fas fa-cog"></i>
                    </button>
                </div>
                <input type="file" id="pdf-upload" accept="application/pdf" class="hidden" @change="handleFileUpload">
            </div>
            
            <div class="p-4 flex-1 overflow-y-auto">
                <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">章节大纲 (支持跳转)</h3>
                
                <ul v-if="outline.length > 0" class="text-sm space-y-2">
                    <!-- 动态绑定 paddingLeft 以支持缩进（层级显示） -->
                    <li v-for="(item, idx) in outline" :key="idx" 
                        class="cursor-pointer hover:text-blue-600 truncate transition-colors flex items-center" 
                        :style="{ paddingLeft: ((item.level > 1 ? item.level - 1 : 0) * 14) + 'px' }"
                        @click="goToPage(item.page)">
                        <span class="mr-2 text-gray-400 text-xs shrink-0" :class="{'font-bold text-gray-600': item.level===1}">P{{item.page}}</span>
                        <span class="truncate" :class="{'font-semibold': item.level===1}">{{ item.title }}</span>
                    </li>
                </ul>
                <div v-else class="text-sm text-gray-400 italic">
                    <div v-if="isUploading"><i class="fas fa-spinner fa-spin mr-1"></i>正在解析文档...</div>
                    <div v-else-if="isGeneratingOutline"><i class="fas fa-robot fa-spin mr-1"></i>AI 正在通读全文推断大纲...</div>
                    <div v-else>上传PDF后自动生成完整大纲</div>
                </div>
            </div>
        </div>

        <div class="resizer hidden md:block" @mousedown="startDrag('left')"></div>

        <!-- ================= 中栏：原版PDF渲染区 ================= -->
        <div class="bg-paper font-lora flex-1 flex flex-col relative overflow-hidden text-lg">
            <div class="flex-1 overflow-y-auto p-4 md:p-8 relative scroll-smooth bg-gray-100" id="pdf-container">
                <div v-if="!pdfDoc" class="flex flex-col items-center justify-center h-full text-gray-400">
                    <i class="fas fa-file-pdf text-6xl mb-4 text-gray-300"></i>
                    <p class="font-sans">请点击左侧按钮上传 PDF 文件</p>
                    <p class="text-sm mt-2">支持精准划线、AI翻译、自动提取完整大纲</p>
                </div>
                
                <div v-for="pageNum in totalPages" :key="pageNum" :id="'page-wrapper-' + pageNum" class="pdf-page-container">
                    <canvas :id="'page-canvas-' + pageNum" class="block"></canvas>
                    <div :id="'text-layer-' + pageNum" class="textLayer"></div>
                </div>
            </div>
        </div>

        <!-- 悬浮划线智能菜单 -->
        <div v-if="popover.show" 
             class="fixed bg-gray-800 text-white rounded-md shadow-lg flex items-center p-1 space-x-1 z-50 transition-all"
             :style="{ top: popover.y + 'px', left: popover.x + 'px', transform: 'translate(-50%, -100%)', marginTop: '-8px' }">
            <button @click="createAnnotation" class="px-3 py-1 hover:bg-gray-700 rounded text-sm text-highlight"><i class="fas fa-highlighter"></i> 批注</button>
            <button @click="aiTranslate" class="px-3 py-1 hover:bg-gray-700 rounded text-sm"><i class="fas fa-language"></i> 翻译</button>
            <button @click="aiAsk" class="px-3 py-1 hover:bg-gray-700 rounded text-sm"><i class="fas fa-robot"></i> 答疑</button>
        </div>

        <div class="resizer hidden md:block" @mousedown="startDrag('right')"></div>

        <!-- ================= 右栏：AI交互与批注 ================= -->
        <div class="bg-white flex flex-col hidden md:flex shrink-0 transition-all" :style="{ width: rightWidth + 'px' }">
            <div class="flex border-b text-sm font-medium shrink-0">
                <button @click="activeTab = 'ai'" :class="activeTab==='ai' ? 'border-b-2 border-blue-600 text-blue-600' : 'text-gray-500'" class="flex-1 py-3 bg-gray-50 hover:bg-gray-100">全知 AI 助手</button>
                <button @click="activeTab = 'note'" :class="activeTab==='note' ? 'border-b-2 border-orange-400 text-orange-500' : 'text-gray-500'" class="flex-1 py-3 bg-gray-50 hover:bg-gray-100">我的批注 ({{annotations.length}})</button>
            </div>

            <div v-show="activeTab === 'ai'" class="flex-1 flex flex-col h-full overflow-hidden">
                <div class="flex-1 overflow-y-auto p-4 space-y-4 text-sm" id="chat-box">
                    <div v-for="(msg, i) in aiMessages" :key="i" :class="msg.role === 'user' ? 'text-right' : 'text-left'">
                        <div class="inline-block p-3 rounded-lg max-w-[90%] shadow-sm text-left"
                             :class="msg.role === 'user' ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-800'">
                            <p v-if="msg.context" class="text-xs opacity-80 border-l-2 border-white/50 pl-2 mb-2 italic line-clamp-3">划线内容: "{{msg.context}}"</p>
                            <div v-html="formatMsg(msg.content)" class="leading-relaxed break-words"></div>
                        </div>
                    </div>
                    <div v-if="aiLoading" class="text-left"><span class="inline-block p-3 bg-gray-100 rounded-lg text-gray-500 animate-pulse"><i class="fas fa-circle-notch fa-spin"></i> AI 思考中...</span></div>
                </div>
                <div class="p-3 border-t bg-gray-50 shrink-0">
                    <textarea v-model="aiInput" @keydown.enter.prevent="sendAiMessage" placeholder="在此向 AI 提问 (已注入全文上下文)..." class="w-full bg-white border border-gray-300 rounded p-2 text-sm outline-none focus:border-blue-500 resize-none h-20 shadow-inner"></textarea>
                </div>
            </div>

            <div v-show="activeTab === 'note'" class="flex-1 overflow-y-auto p-4 space-y-4">
                <div v-if="annotations.length === 0" class="text-center text-gray-400 text-sm mt-10">暂无批注，请在原版PDF划线添加</div>
                <div v-for="anno in annotations" :key="anno.id" class="relative group border-l-4 border-highlight bg-orange-50 p-3 rounded-r-md shadow-sm transition-all hover:shadow">
                    <p class="text-sm font-lora text-gray-700 italic mb-2">"{{ anno.text }}"</p>
                    <textarea v-model="anno.note" @change="saveData" placeholder="输入批注想法..." class="w-full text-sm bg-white/60 border border-orange-200 rounded p-2 outline-none focus:bg-white resize-none"></textarea>
                    <button @click="deleteAnnotation(anno.id)" class="absolute top-2 right-2 text-red-500 opacity-0 group-hover:opacity-100 transition-opacity text-xs bg-red-100 px-2 py-1 rounded">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- ================= API 配置 Modal ================= -->
        <div v-if="showApiModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
            <div class="bg-white w-[420px] rounded-lg shadow-xl p-6 font-sans">
                <h2 class="text-lg font-bold mb-4">API 引擎配置</h2>
                <div class="space-y-4 text-sm">
                    <div>
                        <label class="block text-gray-700 mb-1">快捷预设模型(推荐选用长文本模型)</label>
                        <select v-model="apiConfig.preset" @change="applyPreset" class="w-full border p-2 rounded focus:outline-blue-500 bg-gray-50">
                            <option value="deepseek">DeepSeek (性价比最高)</option>
                            <option value="kimi">Moonshot Kimi (长文本极佳)</option>
                            <option value="openai">OpenAI (GPT-4o)</option>
                            <option value="custom">自定义格式</option>
                        </select>
                    </div>
                    <div><label class="block text-gray-700 mb-1">API Base URL</label><input v-model="apiConfig.baseUrl" type="text" class="w-full border p-2 rounded focus:outline-blue-500"></div>
                    <div><label class="block text-gray-700 mb-1">Model Name</label><input v-model="apiConfig.model" type="text" class="w-full border p-2 rounded focus:outline-blue-500"></div>
                    <div><label class="block text-gray-700 mb-1">API Key (密钥仅保存在本地)</label><input v-model="apiConfig.apiKey" type="password" placeholder="sk-..." class="w-full border p-2 rounded focus:outline-blue-500"></div>
                </div>
                <div class="mt-6 flex justify-end space-x-3">
                    <button @click="showApiModal = false" class="px-4 py-2 text-gray-500 hover:bg-gray-100 rounded">取消</button>
                    <button @click="saveApiConfig" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">保存配置</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, reactive, onMounted, nextTick } = Vue;

        createApp({
            setup() {
                const leftWidth = ref(250);
                const rightWidth = ref(350);
                let draggingPanel = null;

                const pdfDoc = ref(null);
                const totalPages = ref(0);
                const paperTitle = ref('');
                const outline = ref([]);
                const isUploading = ref(false);
                const isGeneratingOutline = ref(false);
                const fullDocumentContext = ref('');

                const activeTab = ref('ai');
                const selectedText = ref('');
                const popover = reactive({ show: false, x: 0, y: 0 });
                const annotations = ref([]);

                const showApiModal = ref(false);
                const aiMessages = ref([{ role: 'assistant', content: '您好！上传 PDF 后，您可以：\n1. 在中栏精准划线，进行翻译或批注；\n2. 我会自动读取全篇内容，您可直接向我提问论文细节。' }]);
                const aiInput = ref('');
                const aiLoading = ref(false);

                const apiConfig = reactive({ preset: 'deepseek', baseUrl: 'https://api.deepseek.com/v1', model: 'deepseek-chat', apiKey: '' });
                const presets = {
                    deepseek: { baseUrl: 'https://api.deepseek.com/v1', model: 'deepseek-chat' },
                    kimi: { baseUrl: 'https://api.moonshot.cn/v1', model: 'moonshot-v1-8k' },
                    openai: { baseUrl: 'https://api.openai.com/v1', model: 'gpt-4o' }
                };

                onMounted(() => {
                    const savedApi = localStorage.getItem('paper_agent_api');
                    if(savedApi) Object.assign(apiConfig, JSON.parse(savedApi));
                    const savedAnnos = localStorage.getItem('paper_agent_annos');
                    if(savedAnnos) annotations.value = JSON.parse(savedAnnos);

                    document.addEventListener('selectionchange', handleSelection);
                    document.addEventListener('mousedown', (e) => {
                        if (!e.target.closest('#pdf-container') && !e.target.closest('.fixed')) {
                            popover.show = false;
                        }
                    });
                });

                const startDrag = (panel) => { draggingPanel = panel; document.addEventListener('mousemove', onDrag); document.addEventListener('mouseup', stopDrag); document.body.style.cursor = 'col-resize'; };
                const onDrag = (e) => {
                    if (draggingPanel === 'left') leftWidth.value = Math.max(180, Math.min(e.clientX, 400));
                    if (draggingPanel === 'right') rightWidth.value = Math.max(250, Math.min(window.innerWidth - e.clientX, 600));
                };
                const stopDrag = () => { document.removeEventListener('mousemove', onDrag); document.removeEventListener('mouseup', stopDrag); document.body.style.cursor = 'default'; };

                const applyPreset = () => { if(presets[apiConfig.preset]) { apiConfig.baseUrl = presets[apiConfig.preset].baseUrl; apiConfig.model = presets[apiConfig.preset].model; } };
                const saveApiConfig = () => { localStorage.setItem('paper_agent_api', JSON.stringify(apiConfig)); showApiModal.value = false; };

                const triggerUpload = () => document.getElementById('pdf-upload').click();
                
                const handleFileUpload = async (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    paperTitle.value = file.name.replace('.pdf', '');
                    isUploading.value = true;
                    fullDocumentContext.value = '';
                    outline.value =[];
                    
                    try {
                        const arrayBuffer = await file.arrayBuffer();
                        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                        pdfDoc.value = pdf;
                        totalPages.value = pdf.numPages;

                        // 开始渲染页面并提取文字
                        await renderAllPagesAndExtractText(pdf);

                        // 优先读取原生目录，无目录则由 AI 通读全文生成
                        const rawOutline = await pdf.getOutline();
                        const parsedOutline = await parseOutlineWithPages(rawOutline, pdf, 1);
                        
                        if (parsedOutline && parsedOutline.length > 0) {
                            outline.value = parsedOutline;
                        } else if (apiConfig.apiKey) {
                            generateOutlineByAI();
                        } else {
                            outline.value =[{ title: '未提取到目录，请配置API后重新上传以生成', page: 1, level: 1 }];
                        }

                    } catch (error) {
                        alert("解析失败: " + error.message);
                    } finally {
                        isUploading.value = false;
                    }
                };

                const parseOutlineWithPages = async (items, pdf, level) => {
                    if (!items || items.length === 0) return [];
                    let result =[];
                    for (let item of items) {
                        let pageNum = 1;
                        try {
                            let dest = typeof item.dest === 'string' ? await pdf.getDestination(item.dest) : item.dest;
                            if (dest) pageNum = (await pdf.getPageIndex(dest[0])) + 1;
                        } catch(e) {}
                        
                        result.push({ title: item.title, page: pageNum, level: level });
                        if (item.items && item.items.length > 0) {
                            result = result.concat(await parseOutlineWithPages(item.items, pdf, level + 1));
                        }
                    }
                    return result;
                };

                const renderAllPagesAndExtractText = async (pdf) => {
                    let extractedText = '';
                    for (let num = 1; num <= pdf.numPages; num++) {
                        const page = await pdf.getPage(num);
                        const viewport = page.getViewport({ scale: 1.5 });

                        const wrapper = document.getElementById(`page-wrapper-${num}`);
                        if(!wrapper) continue;
                        wrapper.style.width = viewport.width + 'px';
                        wrapper.style.height = viewport.height + 'px';

                        const canvas = document.getElementById(`page-canvas-${num}`);
                        const context = canvas.getContext('2d');
                        canvas.height = viewport.height; canvas.width = viewport.width;
                        await page.render({ canvasContext: context, viewport }).promise;

                        const textContent = await page.getTextContent();
                        const textLayerDiv = document.getElementById(`text-layer-${num}`);
                        textLayerDiv.innerHTML = ''; 
                        textLayerDiv.style.width = viewport.width + 'px';
                        textLayerDiv.style.height = viewport.height + 'px';
                        textLayerDiv.style.setProperty('--scale-factor', viewport.scale);

                        await pdfjsLib.renderTextLayer({
                            textContentSource: textContent,
                            container: textLayerDiv,
                            viewport: viewport,
                            textDivs:[]
                        }).promise;

                        // 注入 [Page num] 标识符给 AI 推断页码用
                        const pageString = textContent.items.map(s => s.str).join(' ');
                        extractedText += `\n\n--- [Page ${num}] ---\n${pageString}`;
                    }
                    fullDocumentContext.value = extractedText;
                };

                // ================= 修复核心：大模型解析全篇大纲 =================
                const generateOutlineByAI = async () => {
                    isGeneratingOutline.value = true;
                    try {
                        // 【修复1】大幅放宽截取范围至 100,000 字符（约能涵盖几十页），确保 AI 能读到文章末尾的 Conclusion/References
                        const introText = fullDocumentContext.value.substring(0, 100000); 
                        
                        // 【修复2】强化 Prompt：要求提取所有主要章节及子章节，并输出层级结构
                        const prompt = `你是一个专业的学术文献助手。请仔细阅读以下整篇论文的内容，为用户提取出详细、完整的章节目录大纲。
要求如下：
1. 必须覆盖全文（从 Abstract 到 Conclusion / References）。
2. 识别出一级标题和二级标题。
3. 根据文本中 "[Page X]" 的标记，推断该章节位于哪一页。
4. 必须以严格的 JSON 数组格式返回。

JSON 字段要求：
- "title": 标题名称（保留原序号，如 "1. Introduction" 或 "3.1 Datasets"）
- "page": 页码（数字，如 1）
- "level": 层级（数字，1 代表一级标题，2 代表二级子标题）

输出示例：[
  {"title": "Abstract", "page": 1, "level": 1},
  {"title": "1. Introduction", "page": 1, "level": 1},
  {"title": "2. Related Work", "page": 2, "level": 1},
  {"title": "2.1 Deep Learning", "page": 2, "level": 2}
]

请不要返回任何Markdown代码块标识符（如 \`\`\`json ），不要输出其他废话说明，只输出合法 JSON 数组。

论文文本：\n${introText}`;
                        
                        const res = await callAI(prompt, "你是一个只输出严格 JSON 数组格式大纲的机器人。");
                        
                        // 【修复3】更健壮的 JSON 解析正则与清理，防止带有 markdown tags 导致报错
                        let cleanJson = res.replace(/```json/gi, '').replace(/```/g, '').trim();
                        const jsonMatch = cleanJson.match(/\[[\s\S]*\]/);
                        
                        if (jsonMatch) {
                            outline.value = JSON.parse(jsonMatch[0]);
                        } else {
                            throw new Error("JSON 解析失败: " + cleanJson);
                        }
                    } catch (e) {
                        console.error("AI 大纲生成失败", e);
                        outline.value =[{ title: 'AI 提取全篇大纲失败，请重传重试', page: 1, level: 1 }];
                    } finally {
                        isGeneratingOutline.value = false;
                    }
                };

                const goToPage = (pageNum) => {
                    const el = document.getElementById(`page-wrapper-${pageNum}`);
                    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                };

                const handleSelection = () => {
                    setTimeout(() => {
                        const selection = window.getSelection();
                        const text = selection.toString().trim();
                        
                        if (text.length > 0 && selection.anchorNode && document.getElementById('pdf-container').contains(selection.anchorNode)) {
                            selectedText.value = text;
                            const range = selection.getRangeAt(0);
                            const rect = range.getBoundingClientRect(); 
                            
                            popover.x = rect.left + (rect.width / 2);
                            popover.y = rect.top;
                            popover.show = true;
                        } else {
                            popover.show = false;
                        }
                    }, 50);
                };

                const createAnnotation = () => { annotations.value.push({ id: Date.now(), text: selectedText.value, note: '' }); activeTab.value = 'note'; popover.show = false; window.getSelection().removeAllRanges(); saveData(); };
                const deleteAnnotation = (id) => { annotations.value = annotations.value.filter(a => a.id !== id); saveData(); };
                const saveData = () => localStorage.setItem('paper_agent_annos', JSON.stringify(annotations.value));

                const scrollToBottom = () => nextTick(() => { const box = document.getElementById('chat-box'); if(box) box.scrollTop = box.scrollHeight; });
                const formatMsg = (text) => text.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

                const callAI = async (prompt, systemRole = "你是一个专业的学术论文助手。") => {
                    if (!apiConfig.apiKey) {
                        alert("请先配置 API Key！"); showApiModal.value = true; throw new Error("No API Key");
                    }
                    
                    let systemContent = systemRole;
                    if (fullDocumentContext.value && systemRole.includes("学术")) {
                        systemContent += `\n\n【论文参考全文】：\n${fullDocumentContext.value.substring(0, 40000)}`;
                    }

                    const response = await fetch(`${apiConfig.baseUrl}/chat/completions`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiConfig.apiKey}` },
                        body: JSON.stringify({
                            model: apiConfig.model,
                            messages:[ { role: 'system', content: systemContent }, { role: 'user', content: prompt } ],
                            temperature: 0.1 // 降低 temperature 增加大纲提取的确定性
                        })
                    });

                    if (!response.ok) throw new Error("API 请求失败");
                    const data = await response.json();
                    return data.choices[0].message.content;
                };

                const aiTranslate = async () => {
                    const text = selectedText.value;
                    popover.show = false; activeTab.value = 'ai';
                    aiMessages.value.push({ role: 'user', content: '请翻译划线内容。', context: text });
                    aiLoading.value = true; scrollToBottom();

                    try {
                        const reply = await callAI(`结合全文语境，将以下学术片段翻译为精准流畅的中文：\n"${text}"`);
                        aiMessages.value.push({ role: 'assistant', content: reply });
                    } catch (e) { aiMessages.value.push({ role: 'assistant', content: '翻译失败，请检查API配置。' }); }
                    aiLoading.value = false; scrollToBottom();
                };

                const aiAsk = async () => {
                    const text = selectedText.value;
                    popover.show = false; activeTab.value = 'ai';
                    aiMessages.value.push({ role: 'user', content: '请解释这段内容。', context: text });
                    aiLoading.value = true; scrollToBottom();

                    try {
                        const reply = await callAI(`作为AI学术助手，请结合论文全文，详细解释以下划线片段的概念，并说明它在文中的作用：\n"${text}"`);
                        aiMessages.value.push({ role: 'assistant', content: reply });
                    } catch (e) { aiMessages.value.push({ role: 'assistant', content: '请求失败。' }); }
                    aiLoading.value = false; scrollToBottom();
                };

                const sendAiMessage = async () => {
                    if (!aiInput.value.trim()) return;
                    const msg = aiInput.value; aiInput.value = '';
                    aiMessages.value.push({ role: 'user', content: msg });
                    aiLoading.value = true; scrollToBottom();

                    try {
                        const reply = await callAI(`用户提问：${msg}`);
                        aiMessages.value.push({ role: 'assistant', content: reply });
                    } catch (e) { aiMessages.value.push({ role: 'assistant', content: '请求失败，请检查网络或API Key。' }); }
                    aiLoading.value = false; scrollToBottom();
                };

                return {
                    leftWidth, rightWidth, startDrag,
                    pdfDoc, totalPages, paperTitle, outline, isUploading, isGeneratingOutline,
                    triggerUpload, handleFileUpload, goToPage,
                    activeTab, selectedText, popover, annotations, createAnnotation, deleteAnnotation, saveData,
                    showApiModal, apiConfig, applyPreset, saveApiConfig,
                    aiMessages, aiInput, aiLoading, aiTranslate, aiAsk, sendAiMessage, formatMsg
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
